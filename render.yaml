services:
  - type: web
    name: wardrobe-lord
    env: node
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wardrobe-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: wardrobe-db
    databaseName: wardrobedb
    user: wardrobeuser
    plan: free
